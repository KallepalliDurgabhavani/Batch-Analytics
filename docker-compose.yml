services:
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    environment:
      - CLUSTER_NAME=test-cluster
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    ports:
      - "9870:9870"
      - "9000:9000"
    volumes:
      - namenode_data:/hadoop/dfs/name
      - ./data:/data
      - ./output:/output
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/9870'"]
      interval: 30s
      timeout: 10s
      retries: 5

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - SERVICE_PRECONDITION=namenode:9870
    depends_on:
      namenode:
        condition: service_healthy
    ports:
      - "9864:9864"
    volumes:
      - datanode_data:/hadoop/dfs/data
      - ./data:/data
      - ./output:/output
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/9864'"]
      interval: 30s
      timeout: 10s
      retries: 5

  spark-master:
    image: apache/spark:4.0.2-python3
    container_name: spark-master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    depends_on:
      namenode:
        condition: service_healthy
    ports:
      - "8081:8080"
      - "7077:7077"
    volumes:
      - ./jobs:/jobs
      - ./data:/data
      - ./output:/output
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8080'"]
      interval: 30s
      timeout: 10s
      retries: 5

  spark-worker:
    image: apache/spark:4.0.2-python3
    container_name: spark-worker
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    depends_on:
      spark-master:
        condition: service_healthy
    volumes:
      - ./jobs:/jobs
      - ./data:/data
      - ./output:/output
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -q 'org.apache.spark.deploy.worker.Worker'"]
      interval: 30s
      timeout: 10s
      retries: 5

  data-generator:
    image: python:3.10-slim
    container_name: data-generator
    working_dir: /app
    command: >
      bash -c "
      apt-get update &&
      apt-get install -y bash sed &&
      ls -l /app/data &&
      sed -i 's/\r$//' /app/data/generate_records.sh &&
      chmod +x /app/data/generate_records.sh &&
      mkdir -p /data &&
      bash /app/data/generate_records.sh &&
      echo '✅ Data generation completed' &&
      tail -f /dev/null
      "
    volumes:
      - ./:/app
      - ./data:/data
    healthcheck:
      test: ["CMD", "test", "-f", "/data/cdr_data.csv"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-db:
    image: postgres:15
    container_name: airflow-db
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    volumes:
      - airflow_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 10

  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    image: custom-airflow:2.8.0
    container_name: airflow-init
    user: "50000:0"
    working_dir: /opt/airflow
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=False
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
      - AIRFLOW__CORE__FERNET_KEY=somekey123
      - AIRFLOW__WEBSERVER__SECRET_KEY=airflowsecretkey
    depends_on:
      data-generator:
        condition: service_healthy
      spark-master:
        condition: service_healthy
      namenode:
        condition: service_healthy
      airflow-db:
        condition: service_healthy
    volumes:
      - ./dags:/opt/airflow/dags
      - ./jobs:/jobs
      - ./data:/data
      - ./output:/output
      - ./run_pipeline.sh:/opt/airflow/run_pipeline.sh
      - ./airflow_logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create --username admin --firstname admin --lastname admin --role Admin --email admin@example.com --password admin"
    restart: "no"

  airflow:
    image: custom-airflow:2.8.0
    container_name: airflow
    user: "50000:0"
    working_dir: /opt/airflow
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=False
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
      - AIRFLOW__CORE__FERNET_KEY=somekey123
      - AIRFLOW__WEBSERVER__SECRET_KEY=airflowsecretkey
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./jobs:/jobs
      - ./data:/data
      - ./output:/output
      - ./run_pipeline.sh:/opt/airflow/run_pipeline.sh
      - ./airflow_logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    command: webserver
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    image: custom-airflow:2.8.0
    container_name: airflow-scheduler
    user: "50000:0"
    working_dir: /opt/airflow
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=False
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
      - AIRFLOW__CORE__FERNET_KEY=somekey123
      - AIRFLOW__WEBSERVER__SECRET_KEY=airflowsecretkey
    depends_on:
      airflow:
        condition: service_healthy
    volumes:
      - ./dags:/opt/airflow/dags
      - ./jobs:/jobs
      - ./data:/data
      - ./output:/output
      - ./run_pipeline.sh:/opt/airflow/run_pipeline.sh
      - ./airflow_logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    command: scheduler

volumes:
  namenode_data:
  datanode_data:
  airflow_db_data: